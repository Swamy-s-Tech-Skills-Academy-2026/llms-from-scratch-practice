# Lychee link-checker configuration (canonical — referenced by CI and local tooling)
# https://lycheeverse.github.io/lychee/configuration/

# ── Scope ────────────────────────────────────────────────────────────────────
# Check all markdown files; exclude source-material (read-only staging area)
# and tool/environment directories that contain no educational links.
exclude_path = [
  "source-material",
  ".venv",
  ".cursor",
  ".github",
]

# ── Accepted HTTP status codes ────────────────────────────────────────────────
# 200 is always accepted. Also accept 206 (partial), 429 (rate-limited)
accept = [200, 206, 429]

# ── Timeout & retries ─────────────────────────────────────────────────────────
timeout = 20
max_retries = 3
retry_wait_time = 2

# ── Exclude patterns ──────────────────────────────────────────────────────────
exclude = [
    # Localhost / loopback
    "^https?://localhost",
    "^https?://127\\.0\\.0\\.1",

    # GitHub rate-limits heavily — skip raw GitHub API / avatar URLs
    "^https://api\\.github\\.com",
    "^https://avatars\\.githubusercontent\\.com",
    # GitHub issue links may rate-limit during CI
    "^https://github\\.com/.*/issues/.*",

    # Example / placeholder domains
    "^https?://example\\.com",

    # mailto links
    "^mailto:",

    # Sites that often return 403 to bots
    "^https://(www\\.)?udemy\\.com/.*",
    "^https://leetcode\\.com/.*",
    "^https://(www\\.)?linkedin\\.com/.*",

    # Known removed / unavailable videos
    "^https://www\\.youtube\\.com/watch\\?v=pTB0EiLXL1Q$",
    "^https://www\\.youtube\\.com/watch\\?v=1ppgUMfUUJw$",
    "^https://www\\.youtube\\.com/watch\\?v=xR1qU-3h_ns$",

    # Local file URIs produced by some tooling scans
    "^file:///",

    # Vite default favicon path (not a valid absolute URI)
    "^/vite\\.svg$",
]

# ── Output ────────────────────────────────────────────────────────────────────
format = "detailed"
no_progress = false
